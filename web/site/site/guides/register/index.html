<script>
// Рендер математики ТОЛЬКО после загрузки шрифтов KaTeX. Иначе KaTeX считает
// позицию черты корня/дроби по метрикам фолбэк-шрифта → линия ложится поперёк
// подкоренного (видимое «зачёркивание»), и без ре-рендера не лечится.
// ignoredClasses:['katex'] — повторный проход не трогает уже отрендеренное.
(function(){
  var KX={delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],throwOnError:false,ignoredClasses:['katex']};
  function whenFontsReady(cb){
    var fams=['KaTeX_Main','KaTeX_Math','KaTeX_Size1','KaTeX_Size2','KaTeX_Size3','KaTeX_Size4','KaTeX_AMS'];
    if(document.fonts&&document.fonts.load){
      Promise.all(fams.map(function(f){return document.fonts.load('1em '+f).catch(function(){});}))
        .then(function(){return document.fonts.ready;}).then(cb,cb);
    } else { cb(); }
  }
  window.tropaMath=function(el){ if(typeof renderMathInElement==='function'){ whenFontsReady(function(){ renderMathInElement(el,KX); }); } };
  window.addEventListener('load',function(){ window.tropaMath(document.body); });
})();
</script>

<script>
(function(){
  var API = (document.body.dataset.botApi ? document.body.dataset.botApi.replace('/chat','/guide-register') : '/api/guide-register');
  var form = document.getElementById('gr-form');
  var submit = document.getElementById('g-submit');
  var msg = document.getElementById('g-msg');
  function val(id){ return document.getElementById(id).value.trim(); }

  form.addEventListener('submit', function(e){
    e.preventDefault();
    var payload = {
      name: val('g-name'), contact: val('g-contact'), region: val('g-region'),
      attestation: val('g-attestation'), topics: val('g-topics'),
      experience: val('g-experience'), link: val('g-link'),
      consent: document.getElementById('g-consent').checked,
      website: val('g-website')
    };
    if(!payload.name || !payload.contact){ show('err','Укажите имя и контакт.'); return; }
    if(!payload.consent){ show('err','Отметьте согласие на обработку персональных данных.'); return; }
    submit.disabled = true; msg.className='gr-msg';
    fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)})
      .then(function(r){return r.json();})
      .then(function(d){
        if(d.ok){ show('ok', d.message || 'Заявка отправлена.'); form.reset(); }
        else { show('err', d.message || 'Не удалось отправить.'); submit.disabled=false; }
      })
      .catch(function(){ show('err','Не получилось связаться с сервером. Попробуйте ещё раз.'); submit.disabled=false; });
  });
  function show(kind, text){ msg.textContent=text; msg.className='gr-msg '+kind; }
})();
</script>
