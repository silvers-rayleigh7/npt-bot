# Черновой маршрут "Университет Иннополис: наука на прогулке".
# Координаты WGS84. Базовая точка адреса Университетская, 1: 55.753681, 48.743252.
# Статус: маршрут готов для первой GPS-прогулки; точные места крепления стендов требуют полевой верификации.

route:
  id: innopolis_university_v0
  name: "Университет Иннополис: наука на прогулке"
  city: "Иннополис, Татарстан"
  distance_km: 1.8
  expected_time_min: 45
  field_status: "needs_gps_walk"
  target: "первый маршрут для команды ЦНПТ УИ"

poi:
  - id: university_entrance
    name: "Главный вход Университета Иннополис"
    lat: 55.753681
    lon: 48.743252
    trigger_radius_m: 90
    topic: "GPS/ГЛОНАСС, синхронизация времени и почему live location вообще работает"
    scenario_brief: >
      Старт маршрута у адреса Университетская, 1. Посетитель только что включил live location,
      поэтому место идеально объясняет навигацию. Спутники не "видят" телефон как камеру:
      телефон измеряет задержку радиосигнала от нескольких спутников и решает задачу
      трилатерации. Ошибка в 1 микросекунду даёт около 300 м по расстоянию, поэтому
      синхронизация времени и поправки релятивистской физики становятся практической
      инженерией в кармане.
    level1_seed: >
      Телефон понимает, где ты стоишь, не потому что спутник тебя сфотографировал, а потому
      что время полёта радиосигнала превращается в расстояние.
    level2_seed: >
      В грубой модели псевдодальность ρ_i = c(t_rx - t_i) + b, где b — ошибка часов
      приёмника. Четыре спутника дают четыре уравнения для x, y, z и b; 1 мкс ошибки
      времени соответствует примерно 300 м ошибки дальности.
    physical_interactive: >
      Плита-трилатератор: три стальные дуги с радиусами и подвижная шайба "телефон".
      Посетитель вручную ищет пересечение окружностей и видит, как малая ошибка времени
      раздувает область неопределённости.
    tags: [геометрия, навигация, ИТ]
    expert: "В. Сурдин / спутниковая навигация"
    sources:
      - "BRIEF.md: сюжет 6, GPS/ГЛОНАСС и синхронизация времени"
      - "https://innopolis.ginfo.ru/ulicy/universitetskaya_ulica/1/"
      - "https://innopolis.university/basic/"
    verified: false

  - id: atrium_library
    name: "Атриум и библиотека кампуса"
    lat: 55.753360
    lon: 48.743880
    trigger_radius_m: 85
    topic: "Акустика, время реверберации и почему в больших залах трудно говорить"
    scenario_brief: >
      Внутренний общественный центр университета: библиотека, аудитории, переходы и высокий
      объём воздуха. Большой зал звучит не как маленькая комната: после хлопка звук ещё
      живёт за счёт отражений от стен, стекла и потолка. Формула Сабина связывает время
      реверберации T_60 с объёмом V и эквивалентной площадью поглощения A: T_60 = 0.161 V/A.
      Поэтому ковры, люди, книжные полки и акустические панели не декор, а управление
      дифференциальным уравнением для энергии звука.
    level1_seed: >
      Один хлопок в большом атриуме показывает, что звук — это не точка, а облако отражений,
      которое можно укротить материалами.
    level2_seed: >
      По Сабину T_60 = 0.161 V/A. Если V = 5000 м³, а A = 500 м² сабинов, получаем
      T_60 ≈ 1.6 с; удвоение поглощающей площади почти вдвое сокращает хвост эха.
    physical_interactive: >
      Антивандальный "эхо-хлопок": две металлические пластины на стойке и шкала секунд.
      Посетитель хлопает, считает спад эха и сравнивает открытую зону с зоной у книжных
      полок или мягкой отделки.
    tags: [физика, архитектура, звук]
    expert: "С. Семихатов / физика волн"
    sources:
      - "BRIEF.md: требование считать на пальцах и привязывать к месту"
      - "https://innopolis.university/en/campus/"
    verified: false

  - id: robot_path
    name: "Пешеходная дорожка роботов и доставок"
    lat: 55.752780
    lon: 48.744900
    trigger_radius_m: 85
    topic: "SLAM, лидар и как робот строит карту, пока сам не знает, где находится"
    scenario_brief: >
      В Иннополисе привычны роботы-доставщики и автономные сервисы. Главный парадокс SLAM:
      чтобы понять своё положение, роботу нужна карта, но чтобы построить карту, ему нужно
      знать своё положение. Инженерное решение — вероятностная оценка: одометрия даёт
      предсказание, лидар или камера дают поправку, фильтр Калмана/частицы сужают облако
      возможных положений. Хороший визуальный образ — робот идёт по коридору неопределённости,
      а каждый ориентир стягивает этот коридор.
    level1_seed: >
      Робот не "видит город" как человек. Он всё время угадывает своё положение и проверяет
      догадку по стенам, бордюрам, столбам и людям.
    level2_seed: >
      В фильтре Калмана шаг прогноза x_k = F x_{k-1} + u расширяет ковариацию P, а измерение
      z_k = H x_k + r уменьшает её. Чем точнее лидарный ориентир, тем меньше эллипс ошибки.
    physical_interactive: >
      Магнитная карта SLAM: на стальной панели нанесён маршрут, а "робот" — магнит с
      полупрозрачным эллипсом ошибки. Возле ориентиров эллипсы сменяются меньшими.
    tags: [робототехника, ИИ, вероятность]
    expert: "Центр робототехники Университета Иннополис"
    sources:
      - "BRIEF.md: сюжет 42, беспилотное такси"
      - "https://innopolis.university/about/"
    verified: false

  - id: tesla_marker
    name: "Точка Теслы и электромагнитная индукция"
    lat: 55.752050
    lon: 48.745520
    trigger_radius_m: 100
    topic: "Индукция Фарадея, переменный ток и почему генератор — это мотор наоборот"
    scenario_brief: >
      Сюжет из реестра Иннополиса: памятник или маркер Н. Теслы. Даже если точное место
      стенда будет уточнено полевой группой, тема работает как физический интерактив:
      катушка, магнит и стрелочный индикатор. Когда магнит движется через катушку, меняется
      магнитный поток, и появляется ЭДС. Это один из самых коротких мостиков от школьной
      физики к энергетике города: генератор на электростанции и рекуперация транспорта
      используют ту же симметрию.
    level1_seed: >
      Если двигать магнит через катушку, лампочка мигает без батарейки: движение стало
      электричеством.
    level2_seed: >
      Закон Фарадея: E = -dΦ/dt. Для катушки N витков ЭДС растёт как N·dΦ/dt; поэтому
      быстрее двигаем магнит или берём больше витков — получаем больший импульс напряжения.
    physical_interactive: >
      Герметичная катушка в прозрачной трубе: посетитель качает магнитный поршень, а
      стрелочный микроамперметр под оргстеклом показывает импульс тока. Без батарейки.
    tags: [физика, энергетика, история]
    expert: "А. Семихатов / электродинамика"
    sources:
      - "BRIEF.md: сюжет 43, памятник Н. Тесле"
      - "BRIEF.md: сюжет 26, энергетика"
    verified: false

  - id: boulevard_game
    name: "Кампусная развилка и правила игры"
    lat: 55.753950
    lon: 48.745850
    trigger_radius_m: 85
    topic: "Равновесие Нэша-Вардропа, парадокс Браесса и дизайн правил"
    scenario_brief: >
      Развилка дорожек на кампусе позволяет объяснить любимый сюжет Гасникова: рациональные
      люди выбирают личный быстрый путь, но система в целом может стать хуже. В дорожном
      движении это равновесие Вардропа; в играх — равновесие Нэша. Контринтуитивный поворот:
      добавленная дорога иногда увеличивает время всех участников, а удаление связи может
      улучшить поток. Финал должен быть не про запрет, а про изменение правил игры:
      ограничения, светофоры, очереди и цены могут служить общественной пользе.
    level1_seed: >
      Если каждый выбирает только свой короткий путь, вся толпа иногда приходит позже.
      Хорошее правило не давит людей, а меняет игру так, чтобы эгоизм работал на систему.
    level2_seed: >
      Для двух маршрутов равновесие Вардропа требует равенства использованных времен:
      T_1(f_1)=T_2(f_2). Социальный оптимум минимизирует f_1T_1(f_1)+f_2T_2(f_2);
      эти условия вообще говоря не совпадают.
    physical_interactive: >
      Доска Браесса с шариками: посетитель пускает шарики по двум каналам, затем открывает
      "короткую перемычку" и видит, что очередь может стать длиннее.
    tags: [математика, теория игр, город]
    expert: "А. Гасников / оптимизация и теория игр"
    sources:
      - "BRIEF.md: сюжет 45, равновесное транспортное моделирование"
      - "BRIEF.md: требования 6, 8, 9 про связность и правила"
    verified: false

  - id: sports_scaling
    name: "Спортивная зона и беговая дорожка"
    lat: 55.755120
    lon: 48.747100
    trigger_radius_m: 110
    topic: "Ходьба, бег, шагомеры и почему масштаб тела меняет механику движения"
    scenario_brief: >
      На спортивной зоне хорошо объяснять механику ходьбы и бега. Шаг — это почти
      перевёрнутый маятник: тело поднимается и опускается, энергия перетекает между
      кинетической и потенциальной. Переход к бегу связан с безразмерным числом Фруда
      Fr = v²/(gL): когда скорость становится слишком большой для длины ноги L, выгоднее
      перейти к фазе полёта. Шагомер в телефоне видит не "шаг", а периодический сигнал
      акселерометра и классифицирует его алгоритмом.
    level1_seed: >
      Телефон считает шаги не глазами. Он чувствует повторяющиеся ускорения в кармане и
      узнаёт в них ритм твоего тела.
    level2_seed: >
      Число Фруда Fr = v²/(gL). Для L = 0.9 м и Fr ≈ 0.5 переход ходьба-бег ожидается
      около v ≈ sqrt(0.5·9.8·0.9) ≈ 2.1 м/с, то есть 7.5 км/ч.
    physical_interactive: >
      Маятниковая нога: металлическая планка с грузом и шкалой длины. Посетитель меняет
      длину "ноги" и видит, как меняется естественный темп шага.
    tags: [спорт, механика, ИИ]
    expert: "А. Богданов / биомеханика"
    sources:
      - "BRIEF.md: сюжет 29, ходьба, бег, прыжки"
      - "https://innopolis.university/en/campus/"
    verified: false

  - id: forest_water_column
    name: "Кромка зелёной зоны кампуса"
    lat: 55.754730
    lon: 48.741420
    trigger_radius_m: 110
    topic: "Как высокие деревья поднимают воду: когезия, отрицательное давление и кавитация"
    scenario_brief: >
      На границе деревьев у кампуса можно дать сильный природный сюжет из брифа. Интуиция
      "дерево сосёт воду как насос" ломается: обычный насос не поднимет воду выше примерно
      10 м, а деревья бывают выше 50 м. Работает когезионно-натяжная теория: испарение
      с листьев тянет непрерывный столб воды вверх, вода в ксилеме находится под
      отрицательным давлением порядка -15...-20 атм. Риск — кавитация, разрыв водяной
      нити пузырьком.
    level1_seed: >
      Дерево не насос. Вода внутри него больше похожа на натянутую цепочку, которую тянут
      сверху листья, испаряющие влагу.
    level2_seed: >
      Гидростатический перепад ρgh для 50 м даёт около 0.5 МПа, то есть 5 атм только
      на высоту. С учётом сопротивления ксилемы реальные натяжения доходят до -15...-20 атм.
    physical_interactive: >
      Вертикальная шкала "10 м насоса": прочная рейка с отметками давления и ручной
      вакуумной присоской под стеклом. Показывает предел обычного всасывания и парадокс
      высоких деревьев.
    tags: [биология, физика, лес]
    expert: "Н. Андреев / биофизика растений"
    sources:
      - "BRIEF.md: сюжет 47, высокие деревья и парадокс Торричелли"
      - "BRIEF.md: цитата-эталон про дерево"
    verified: false

  - id: data_center_view
    name: "Видовая точка на ИТ-инфраструктуру Иннополиса"
    lat: 55.752950
    lon: 48.742280
    trigger_radius_m: 120
    topic: "Дата-центры, тепло и почему информация всегда превращается в физику"
    scenario_brief: >
      Иннополис связан с дата-центром Росатома и крупной ИТ-инфраструктурой. Удобный финал
      маршрута: цифровой город кажется невесомым, но каждый запрос превращается в тепло.
      Сервер потребляет электрическую мощность, почти вся она становится теплом, которое
      нужно отвести. Для стойки 10 кВт это как десять бытовых обогревателей в шкафу.
      Показать связь с энтропией: вычисление, охлаждение и инфраструктура не отменяют
      второе начало термодинамики.
    level1_seed: >
      Облако не висит в небе. Оно стоит в зданиях, ест электричество и греется так, что
      его приходится постоянно охлаждать.
    level2_seed: >
      Если стойка потребляет P = 10 кВт, за час выделяется E = Pt = 36 МДж тепла.
      При перепаде температуры воды 5 K нужен поток m_dot = P/(c_pΔT) ≈ 0.48 кг/с.
    physical_interactive: >
      "Тёплый бит": ручная динамо-машина питает резистор за прозрачным окном и термополосу.
      Посетитель видит, что электрическая работа почти сразу становится теплом.
    tags: [ИТ, термодинамика, инфраструктура]
    expert: "А. Оганов / материалы и энергия"
    sources:
      - "BRIEF.md: сюжет 44, датацентр Росатома"
      - "BRIEF.md: сюжет 67, второе начало и энтропия"
      - "https://www.kommersant.ru/doc/6745198"
    verified: false
