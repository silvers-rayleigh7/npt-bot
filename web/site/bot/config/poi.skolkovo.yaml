  - id: matrex
    name: "Матрекс — пирамида с матрёшкой внутри"
    lat: 55.696844
    lon: 37.360581
    trigger_radius_m: 70
    topic: "Усечённая пирамида, рекурсия и сходимость геометрической прогрессии"
    scenario_brief: >
      Здание Б. Бернаскони — усечённая пирамида, внутри «матрёшечная» спираль.
      (1) Геометрия: объём усечённой пирамиды V = (h/3)·(S₁ + S₂ + √(S₁·S₂)), сравнить с
      обычной пирамидой и египетскими пропорциями. (2) Самоподобие: если каждая внутренняя
      фигура в k раз меньше предыдущей, суммарный объём — геометрическая прогрессия
      V_tot = V_0 / (1 − k³). Связь с фракталами и канторовым множеством.
      (3) Отсылки: зиккураты, Лувр И. М. Пея.
    level1_seed: >
      Снаружи — усечённая пирамида как у египтян, внутри — спрятана матрёшка: вложенные
      тела, каждое чуть меньше предыдущего.
    level2_seed: >
      Если каждая матрёшка в k=0.8 раз меньше, суммарный объём всех вложений сходится:
      Σ k^{3n} = 1/(1 − 0.512) ≈ 2.05 объёма внешней — конечная сумма бесконечной серии.
    tags: [математика, гум, инфраструктура]
    expert: "А. Савватеев / популяризация математики"
    verified: true

  - id: skoltech
    name: "Сколтех — кампус Herzog & de Meuron"
    lat: 55.698183
    lon: 37.359550
    trigger_radius_m: 100
    topic: "Изопериметрическая задача и оптимальная форма кампуса"
    scenario_brief: >
      Кампус — три кольца разного диаметра (внешнее ~280 м). (1) Изопериметрическая задача:
      при фиксированной площади круг даёт минимальный периметр P = 2√(π·S) — поэтому пузыри,
      клетки и оптимальные планировки тяготеют к кругу. (2) Внутри: на круге диаметра D
      среднее расстояние между двумя случайными точками d̄ = 128·D/(45π²) ≈ 0.288·D — короче,
      чем у квадрата той же площади. (3) Архитекторы — те же, что Tate Modern и стадион
      «Птичье гнездо» в Пекине.
    level1_seed: >
      Этот круглый кампус не для красоты: круг — самая «экономная» форма, при одной и той же
      площади у него короче всех забор.
    level2_seed: >
      Изопериметрическое неравенство L² ≥ 4π·A обращается в равенство только для круга;
      для D≈280 м это значит L ≈ 880 м фасада вместо ~1120 м для квадрата той же площади.
    tags: [математика, физика, инфраструктура]
    expert: "Ю. Нестеров / оптимизация"
    verified: true
