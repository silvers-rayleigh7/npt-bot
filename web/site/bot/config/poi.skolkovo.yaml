# Маршрут пешком: МЦД Сколково → Технопарк → Большой бульвар → Гиперкуб → Матрекс → Сколтех (~1.5 км).

poi:
  - id: skolkovo_mcd
    name: "Станция МЦД Сколково"
    lat: 55.700873
    lon: 37.343663
    trigger_radius_m: 100
    topic: "Электричка, рекуперативное торможение и сила трения качения"
    scenario_brief: >
      Точка въезда в инноград: МЦД-1, открыта 2019. (1) Рекуперативное торможение: при
      торможении ЭП2Д кинетическая энергия E_k = mv²/2 возвращается в сеть, экономия до 30%.
      Для состава 300 т на 90 км/ч это ~94 МДж за одно торможение. (2) Почему ж/д так
      эффективна: коэффициент трения качения сталь-сталь ~0.001 против ~0.015 для шины-асфальт —
      на порядок меньшая удельная энергия движения. (3) Первый электропоезд в России —
      С.Ю.Витте, Баку, 1926.
    level1_seed: >
      Электричка тормозит и одновременно заряжает сеть — её мотор работает как генератор,
      возвращая до трети энергии.
    level2_seed: >
      Удельная работа сопротивления качения w = μ·m·g; для μ_rail ≈ 10⁻³ vs μ_road ≈ 1.5·10⁻²
      электричка тратит в ~15 раз меньше энергии на километр, чем эквивалентный автобус.
    tags: [физика, инфраструктура]
    expert: "В. Нестеров / транспортная экономика"
    verified: true

  - id: technopark
    name: "Технопарк Сколково"
    lat: 55.692318
    lon: 37.347485
    trigger_radius_m: 90
    topic: "Атриум, эффект дымохода и естественная вентиляция"
    scenario_brief: >
      Самое большое здание технопарка в Восточной Европе, огромный атриум. (1) Эффект дымохода
      (stack effect): тёплый воздух поднимается, создавая тягу Δp = ρ₀·g·h·(T_i − T_o)/T_i.
      Для h=30 м и ΔT=10 K — ~10 Па, достаточно для естественной вентиляции. (2) Звук в
      атриуме: время реверберации Сабина T_60 = 0.161·V/A. (3) Экосистема — ~3000 резидентов.
    level1_seed: >
      Высокий атриум — это не просто красиво: тёплый воздух поднимается как в дымоходе и тянет
      свежий снизу, кондиционеру помогает физика.
    level2_seed: >
      Stack pressure Δp = ρ_o·g·h·(T_i − T_o)/T_i; при h=30 м, T_i=293 K, T_o=283 K →
      Δp ≈ 12 Па, эквивалент ветра ~4.5 м/с — десятки м³ воздуха в секунду самотёком.
    tags: [физика, инфраструктура]
    expert: "В. Гордин / архитектурная физика"
    verified: true

  - id: world_class_skolkovo
    name: "World Class Skolkovo"
    lat: 55.689127
    lon: 37.354716
    trigger_radius_m: 120
    topic: "Ходьба, бег, тренажёры и число Фруда"
    scenario_brief: >
      Фитнес-клуб на улице Зворыкина, 21 — естественная спортивная точка маршрута.
      Объяснить механику ходьбы и бега: шаг похож на перевёрнутый маятник, а переход к
      бегу связан с безразмерным числом Фруда Fr = v²/(gL). При длине ноги около 0.9 м
      переход ходьба-бег ожидается около 2.1 м/с, то есть 7.5 км/ч. Шагомер в телефоне
      видит не шаг глазами, а периодический сигнал акселерометра.
    level1_seed: >
      В спортзале кажется, что движение — вопрос силы воли. Но даже переход от ходьбы к бегу
      подчиняется простой механике: тело перестаёт быть удобным маятником и выгоднее
      переходит в короткую фазу полёта.
    level2_seed: >
      Число Фруда Fr = v²/(gL). Для L = 0.9 м и Fr ≈ 0.5 переход ходьба-бег ожидается
      около v ≈ sqrt(0.5·9.8·0.9) ≈ 2.1 м/с, то есть примерно 7.5 км/ч.
    tags: [спорт, механика, ИИ]
    expert: "А. Богданов / биомеханика"
    sources:
      - "https://worldclass-sk.ru/office"
      - "https://tv.yandex.com/maps/213/moscow/house/ulitsa_zvorykina_21/Z04YdQJkTkQBQFtvfXp5eH1hYg%3D%3D/"
    verified: true

  - id: bolshoy_blvd_center
    name: "Большой бульвар (центральная площадь)"
    lat: 55.693668
    lon: 37.349749
    trigger_radius_m: 60
    topic: "Городские пешеходные потоки, фундаментальная диаграмма Гринширша"
    scenario_brief: >
      Главная пешеходная ось иннограда — Большой бульвар, ширина ~25 м, длина >2 км.
      (1) Фундаментальная диаграмма пешеходов: q = ρ·v, скорость линейно падает с плотностью
      (модель Гринширша v = v_0·(1 − ρ/ρ_max)), максимум потока при ρ ≈ ρ_max/2. Для пешеходов
      v_0 ≈ 1.34 м/с, ρ_max ≈ 5 чел/м². (2) Уровни обслуживания LOS A–F по Фруину.
      (3) Бульвар как тип впервые формализовал Османн в Париже 1850-х.
    level1_seed: >
      Этот бульвар — не просто широкая дорожка: его ширина и длина рассчитаны по тем же
      формулам, по которым проектируют шоссе, только для людей.
    level2_seed: >
      При модели Гринширша q(ρ) = v_0·ρ·(1 − ρ/ρ_m) максимальный поток
      q_max = v_0·ρ_m/4 ≈ 1.68 чел/(м·с); для ширины 25 м — около 150 чел/с в каждом
      направлении до затора.
    tags: [математика, гум, инфраструктура]
    expert: "М. Блинкин / урбанистика"
    verified: true

  - id: hypercube
    name: "Гиперкуб — первое здание Сколково"
    lat: 55.696549
    lon: 37.355884
    trigger_radius_m: 80
    topic: "Тессеракт (4D-куб), его 3D-проекция и фотовольтаика на фасаде"
    scenario_brief: >
      (1) Геометрия: тессеракт — 4-мерный куб; его 3D-проекция выглядит как куб внутри куба
      со связями вершин — ровно как фасад здания. Аналогия: тень 3D-куба на плоскости — это
      квадрат внутри квадрата. (2) Южный фасад покрыт фотовольтаикой: фотон с энергией
      hν > E_g (для Si ~1.1 эВ) выбивает электрон, разность потенциалов даёт ток.
      Инсоляция в Москве ~3.5 кВт·ч/м²/день, КПД ~18% → ~63 кВт·ч с 100 м² фасада в день.
      (3) Термин «гиперкуб» — Чарльз Хинтон, 1888.
    level1_seed: >
      Это здание — 3D-тень от 4-мерного куба: куб внутри куба, как тень обычного кубика
      на бумаге даёт квадрат внутри квадрата.
    level2_seed: >
      Тессеракт [0,1]^4 ⊂ ℝ⁴ имеет 16 вершин, 32 ребра, 24 грани, 8 кубических ячеек;
      проекция Шлегеля даёт «куб в кубе» с 32 рёбрами — это и есть фасад Гиперкуба.
    tags: [математика, физика, инфраструктура]
    expert: "А. Оганов / материалы и кристаллы"
