<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}{{ site.title }}{% endblock %}</title>
<link rel="icon" href="/assets/trees.svg" type="image/svg+xml">
{% if site.analytics and site.analytics.yandex_id %}<!-- Яндекс.Метрика -->
<script type="text/javascript">
   (function(m,e,t,r,i,k,a){m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};
   m[i].l=1*new Date();for(var j=0;j<document.scripts.length;j++){if(document.scripts[j].src===r){return;}}
   k=e.createElement(t),a=e.getElementsByTagName(t)[0],k.async=1,k.src=r,a.parentNode.insertBefore(k,a)})
   (window,document,"script","https://mc.yandex.ru/metrika/tag.js","ym");
   ym({{ site.analytics.yandex_id }},"init",{clickmap:true,trackLinks:true,accurateTrackBounce:true});
</script>
<noscript><div><img src="https://mc.yandex.ru/watch/{{ site.analytics.yandex_id }}" style="position:absolute;left:-9999px" alt=""></div></noscript>
{% endif %}
<link rel="stylesheet" href="/assets/site-bar/bot.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/contrib/auto-render.min.js"></script>
<script>
// Рендер математики ТОЛЬКО после загрузки шрифтов KaTeX. Иначе KaTeX считает
// позицию черты корня/дроби по метрикам фолбэк-шрифта → линия ложится поперёк
// подкоренного (видимое «зачёркивание»), и без ре-рендера не лечится.
// ignoredClasses:['katex'] — повторный проход не трогает уже отрендеренное.
(function(){
  var KX={delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],throwOnError:false,ignoredClasses:['katex']};
  function whenFontsReady(cb){
    var fams=['KaTeX_Main','KaTeX_Math','KaTeX_Size1','KaTeX_Size2','KaTeX_Size3','KaTeX_Size4','KaTeX_AMS'];
    if(document.fonts&&document.fonts.load){
      Promise.all(fams.map(function(f){return document.fonts.load('1em '+f).catch(function(){});}))
        .then(function(){return document.fonts.ready;}).then(cb,cb);
    } else { cb(); }
  }
  window.tropaMath=function(el){ if(typeof renderMathInElement==='function'){ whenFontsReady(function(){ renderMathInElement(el,KX); }); } };
  window.addEventListener('load',function(){ window.tropaMath(document.body); });
})();
</script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
{% block head %}{% endblock %}
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{overflow-x:clip}
body{max-width:100%;overflow-x:clip}
/* TROPA design system — палитра дизайн-пака */
:root{
  --sand:#DBD4C7;--sage:#B8B5A6;--olive:#7C7F6A;--char:#3E4038;--ink:#1A1A18;
  --g:#7C7F6A;--gd:#3E4038;--gl:#F4F2EE;--bg:#FFFFFF;--card:#FFFFFF;
  --tx:#1A1A18;--tm:#6E7163;--bd:#EAE7E0;--r:10px;
  --serif:"Cormorant Garamond",Georgia,serif;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--tx);background:var(--bg);line-height:1.65;-webkit-font-smoothing:antialiased}
h1,h2,h3,.serif{font-family:var(--serif);font-weight:600;letter-spacing:-0.01em}
a{color:var(--gd);text-decoration:none}a:hover{text-decoration:underline}
.w{max-width:760px;margin:0 auto;padding:0 24px}
.nav{padding:14px 0;border-bottom:1px solid var(--bd);background:#fff}
.nav-inner{display:flex;align-items:center;gap:22px}
.nav-logo{font-family:var(--serif);font-weight:700;font-size:1.3rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink);line-height:1;display:flex;align-items:center;gap:9px}
.nav-logo img{width:22px;height:22px}
.nav-spacer{flex:1}
.nav-link{font-size:0.82rem;color:var(--tm);display:flex;align-items:center;line-height:1;letter-spacing:0.01em}
.nav-link:hover{color:var(--ink);text-decoration:none}
.nav-icon{display:flex;align-items:center;justify-content:center;color:var(--tm);transition:color 0.15s}
.nav-icon:hover{color:var(--olive);text-decoration:none}
.nav-icon i{width:16px;height:16px}
{% block styles %}{% endblock %}
@media(max-width:640px){
  .w{padding:0 16px}
  .nav-inner{gap:14px}
  .nav-logo{font-size:1.12rem;letter-spacing:0.08em;gap:7px}
  .nav-logo img{width:19px;height:19px}
  .nav-link{font-size:0.8rem}
  .nav-icon{display:none}
}
</style>
</head>
<body>
<nav class="nav"><div class="w nav-inner">
  <a href="/" class="nav-logo"><img src="/assets/trees.svg" alt="">Тропа</a>
  <a href="/storylines/" class="nav-link">Сюжеты</a>
  <a href="/routes/" class="nav-link">Маршруты</a>
  <a href="/skills/" class="nav-link">Скиллы</a>
  <a href="/bot/" class="nav-link">Бот</a>
  <a href="/guides/" class="nav-link">Гиды</a>
  <div class="nav-spacer"></div>
  <a href="{{ site.links.telegram }}" class="nav-icon"><i data-lucide="send"></i></a>
</div></nav>
{% block content %}{% endblock %}
<script>lucide.createIcons({attrs:{'stroke-width':1}});</script>
<script defer src="/assets/site-bar/bot.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
