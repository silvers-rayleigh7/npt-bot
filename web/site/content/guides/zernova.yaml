# продающий абзац — голос гида
bio_md: |
  Уже 6 лет показываю этот край так, что его не просто смотрят — его проживают.
  Без шаблонов, зато с атмосферой, деталями и историями, которые остаются с вами.

  Пешком и на своём авто — для тех, кто любит камерность. Автобусные группы —
  моя маленькая сцена, где оживает прошлое. Легко вовлекаю детей и удерживаю
  внимание взрослых, даже тех, кто «не любит экскурсии».

  Помимо Светлогорска провожу обзорную по Калининграду (3,5–4 часа) — остров Канта,
  Рыбная деревня, Музей янтаря — и составляю индивидуальные туры по вашим пожеланиям.

contacts:
