# Маркеры уровней визитёрского текста для станций тропы.
# Парсер (build.py) режет content/exhibits/<code>.md по этим заголовкам и
# рендерит уровни на странице тропы. Только визитёрский текст — без конструкции,
# безопасности, манифеста (они отсекаются STOP-заголовками автоматически).
#
# a — уровень А (кратко, у стенда), b — уровень Б (как работает), c — QR / глубже.
# stop — заголовок, на котором заканчивается визитёрский текст (опционально).
