<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">Архитектура Telegram-бота научной тропы</title>
  <desc id="desc">Live location, POI matcher, генерация нарратива, TTS, STT и команды глубины.</desc>
  <rect width="1280" height="520" fill="#fbfbf8"/>
  <text x="72" y="70" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#18211d">Как работает бот на маршруте</text>
  <text x="72" y="108" font-family="Arial, sans-serif" font-size="18" fill="#58645f">Live Location запускает рассказ рядом с POI; голосовой вопрос возвращается голосовым ответом вокруг ближайшей точки.</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2f6f63"/>
    </marker>
  </defs>

  <g font-family="Arial, sans-serif" font-size="17">
    <g transform="translate(72 170)">
      <rect width="170" height="90" rx="14" fill="#ffffff" stroke="#ccd8d0" stroke-width="2"/>
      <text x="24" y="38" font-weight="700" fill="#17211d">Telegram</text>
      <text x="24" y="64" fill="#52615a">гео + голос</text>
    </g>
    <line x1="252" y1="215" x2="340" y2="215" stroke="#2f6f63" stroke-width="4" marker-end="url(#arrow)"/>
    <g transform="translate(350 170)">
      <rect width="190" height="90" rx="14" fill="#eef6ff" stroke="#9cc3ef" stroke-width="2"/>
      <text x="24" y="38" font-weight="700" fill="#17211d">POIMatcher</text>
      <text x="24" y="64" fill="#52615a">радиус, cooldown</text>
    </g>
    <line x1="550" y1="215" x2="638" y2="215" stroke="#2f6f63" stroke-width="4" marker-end="url(#arrow)"/>
    <g transform="translate(648 170)">
      <rect width="190" height="90" rx="14" fill="#fff6dd" stroke="#e6c66d" stroke-width="2"/>
      <text x="24" y="38" font-weight="700" fill="#17211d">Narrator</text>
      <text x="24" y="64" fill="#52615a">L1/L2/L3 JSON</text>
    </g>
    <line x1="848" y1="215" x2="936" y2="215" stroke="#2f6f63" stroke-width="4" marker-end="url(#arrow)"/>
    <g transform="translate(946 170)">
      <rect width="190" height="90" rx="14" fill="#f4ecff" stroke="#c2a6ef" stroke-width="2"/>
      <text x="24" y="38" font-weight="700" fill="#17211d">TTS</text>
      <text x="24" y="64" fill="#52615a">Silero / edge</text>
    </g>

    <path d="M167 280 V382 H645" fill="none" stroke="#87938c" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
    <g transform="translate(350 335)">
      <rect width="190" height="86" rx="14" fill="#ffffff" stroke="#ccd8d0" stroke-width="2"/>
      <text x="24" y="35" font-weight="700" fill="#17211d">STT</text>
      <text x="24" y="60" fill="#52615a">Groq Whisper</text>
    </g>
    <g transform="translate(648 335)">
      <rect width="190" height="86" rx="14" fill="#ffffff" stroke="#ccd8d0" stroke-width="2"/>
      <text x="24" y="35" font-weight="700" fill="#17211d">Q&amp;A</text>
      <text x="24" y="60" fill="#52615a">ответ у POI</text>
    </g>
    <path d="M838 378 H1042 V272" fill="none" stroke="#87938c" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
  </g>

  <g transform="translate(72 445)" font-family="Arial, sans-serif">
    <text x="0" y="0" font-size="16" font-weight="700" fill="#17211d">Команды MVP:</text>
    <text x="138" y="0" font-size="16" fill="#52615a">/poi · /here · /level2 · /level3 · /sources · voice question</text>
  </g>
</svg>
